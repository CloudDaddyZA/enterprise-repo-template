# ============================================================================
# Dependabot Configuration
# ============================================================================
# Automated dependency updates for security and maintenance.
# Customize the package ecosystems based on your project's technology stack.
# ============================================================================

version: 2

registries: {}
  # Example for private registries:
  # npm-private:
  #   type: npm-registry
  #   url: https://npm.pkg.github.com
  #   token: ${{ secrets.PACKAGES_TOKEN }}

updates:
  # --- GitHub Actions ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "devops"
    reviewers:
      - "org/devops-team"
    open-pull-requests-limit: 5

  # --- Terraform ---
  - package-ecosystem: "terraform"
    directory: "/infra/terraform"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "infrastructure"
    reviewers:
      - "org/platform-team"
    open-pull-requests-limit: 5

  # --- Docker ---
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "infrastructure"

