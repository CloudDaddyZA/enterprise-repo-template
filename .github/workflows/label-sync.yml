# ============================================================================
# Label Sync - Automated Label Management
# ============================================================================
# Syncs repository labels from configuration file on push to main.
# Ensures consistent labeling across all repositories using this template.
# ============================================================================

name: Label Sync

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync-labels:
    name: Sync Labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
          token: ${{ secrets.GITHUB_TOKEN }}
