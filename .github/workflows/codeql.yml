# ============================================================================
# CodeQL Security Scanning
# ============================================================================
# Runs CodeQL analysis on a schedule and on PRs.
# Configure languages based on your project.
#
# NOTE: This workflow is disabled by default in the template (workflow_dispatch
# only). After adding source code, uncomment the push/pull_request/schedule
# triggers below to enable automatic scanning.
# ============================================================================

name: CodeQL Analysis

on:
  workflow_dispatch:
  # Uncomment the triggers below after adding source code to your project:
  # push:
  #   branches: [main]
  #   paths: ['src/**', '*.js', '*.ts', '*.py', '*.go', '*.cs', '*.java']
  # pull_request:
  #   branches: [main]
  #   paths: ['src/**', '*.js', '*.ts', '*.py', '*.go', '*.cs', '*.java']
  # schedule:
  #   - cron: '0 6 * * 1'  # Every Monday at 6:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Configure languages for your project
        # Supported: javascript, typescript, python, go, ruby, java, kotlin, csharp, cpp, swift
        language: ["javascript"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # queries: +security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
